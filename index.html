<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>都市の天気</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="box container col-md-4">
  <h1>都市の天気</h1>
  <select id="city" class="form-select col-mb-3">
    <option value="tosi">都市を選んでね</option>
    <option value="sapporo">札幌</option>
    <option value="sendai">仙台</option>
    <option value="tokyo">東京</option>
    <option value="yokohama">横浜</option>
    <option value="nagoya">名古屋</option>
    <option value="osaka">大阪</option>
    <option value="koube">神戸</option>
    <option value="hirosima">広島</option>
    <option value="hukuoka">福岡</option>
    <option value="naha">那覇</option>
  </select>
  <div class="d-flex gap-3 align-items-end">
    <div id="result" class="card" style="width: 20rem;">
      <div class="card-body">
        <p id="temp" class="card-text">ボタンを押してください</p>
      </div>
    </div>
    <button id="getBtn" class="btn btn-primary col-md-4" >天気を取得</button>
  </div>
</div>
  <script type="module" src="js/main.js"></script>
  <footer class="text-center mt-5">
  <!-- 出典表示-->
  <small>Weather data by<a href="https://open-meteo.com/" target="_blank">Open-Meteo.com</a>CC BY 4.0）</small>
  </footer>
</body>
</html>
